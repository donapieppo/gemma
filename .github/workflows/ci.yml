name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint_and_audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Lint Ruby
        run: bundle exec bin/rubocop -f github

      - name: Audit importmap
        run: bunlde exec bin/importmap audit
