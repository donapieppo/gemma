name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: rails
      RAILS_PASS: rails_pass

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential default-libmysqlclient-dev default-mysql-client pkg-config xvfb libvips-dev

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Prepare MySQL
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS gemma_test;"
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE USER IF NOT EXISTS 'rails'@'%' IDENTIFIED BY 'rails_pass';"
          mysql -h 127.0.0.1 -uroot -proot -e "GRANT ALL PRIVILEGES ON gemma_test.* TO 'rails'@'%';"
          mysql -h 127.0.0.1 -uroot -proot -e "FLUSH PRIVILEGES;"

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Build assets
        run: |
          yarn build
          yarn build:css

      - name: Run CI
        run: xvfb-run -a bin/ci

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
