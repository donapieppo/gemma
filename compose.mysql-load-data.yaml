services:
  mysql-client:
    image: mariadb:12
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_PWD: dbpwd
    volumes:
      - ./tmp/dump.mysql:/tmp/dump.mysql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        until mariadb -h db -u dbuser -e "SELECT 1" dbname >/dev/null 2>&1; do
          echo "Waiting for database..."
          sleep 1
        done
        echo "Loading ./tmp/dump.mysql database..."
        mariadb -h db -u dbuser dbname < /tmp/dump.mysql
